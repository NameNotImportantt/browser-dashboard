name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc -p tsconfig.json --noEmit --ignoreDeprecations 5.0

      - name: Build single-file release
        run: bun run build

      - name: Verify single-file output
        run: test -f dist/index.html

      - name: Build standard multi-file output
        run: bun run build:multi

      - name: Verify PWA build output
        run: |
          test -f dist-vite/index.html
          test -f dist-vite/manifest.webmanifest
          test -f dist-vite/sw.js

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-dashboard-singlefile
          path: dist/index.html
          if-no-files-found: error

      - name: Upload standard build artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-dashboard-standard-build
          path: dist-vite
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/index.html
