name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  install-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

  typecheck:
    needs: install-dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc -p tsconfig.json --noEmit --ignoreDeprecations 5.0

  lint:
    needs: install-dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run ESLint
        run: bun run lint

  build-single:
    needs: [install-dependencies, typecheck, lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build single-file release
        run: bun run build
      - name: Verify single-file output
        run: test -f dist/index.html
      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-dashboard-singlefile
          path: dist/index.html
          if-no-files-found: error

  build-pwa:
    needs: [install-dependencies, typecheck, lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standard multi-file PWA
        run: bun run build:multi
      - name: Verify PWA build output
        run: |
          test -f dist-vite/index.html
          test -f dist-vite/manifest.webmanifest
          test -f dist-vite/sw.js
      - name: Upload standard build artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-dashboard-standard-build
          path: dist-vite
          if-no-files-found: error

  build-extension:
    needs: [install-dependencies, typecheck, lint]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build Chrome extension
        run: bun run build:extension
      - name: Verify Chrome extension output
        run: |
          test -f dist-extension/index.html
          test -f dist-extension/manifest.json
      - name: Package Chrome extension
        run: |
          cd dist-extension
          zip -r ../browser-dashboard-extension.zip .
      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-dashboard-extension
          path: dist-extension
          if-no-files-found: error
      - name: Upload Chrome extension package
        uses: actions/upload-artifact@v4
        with:
          name: browser-dashboard-extension-package
          path: browser-dashboard-extension.zip
          if-no-files-found: error

  build-docker-image:
    needs: install-dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: browser-dashboard:${{ github.sha }}

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-single, build-pwa, build-extension, build-docker-image]
    runs-on: ubuntu-latest

    steps:
      - name: Download single-file artifact
        uses: actions/download-artifact@v4
        with:
          name: browser-dashboard-singlefile
          path: release/single
      - name: Download Chrome extension package
        uses: actions/download-artifact@v4
        with:
          name: browser-dashboard-extension-package
          path: release/extension
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/single/index.html
            release/extension/browser-dashboard-extension.zip
